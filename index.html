    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      --surface2:  #22263a;
      --border:    #2d3252;
      --accent:    #5b6aff;
      --accent2:   #7c8aff;
      --text:      #e8eaf6;
      --text-sub:  #8892b0;
      --hospital:  #e74c3c;
      --clinic:    #5b9cf6;
      --pharmacy:  #3ec97e;
      --radius:    12px;
    }

    html, body { height: 100%; font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; overflow: hidden; }

    /* ── 헤더 ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
      z-index: 1000;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .subtitle { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

    .header-right { display: flex; align-items: center; gap: 10px; }
    #stats-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: var(--text-sub);
    }
    #stats-badge span { color: var(--accent2); font-weight: 700; }

    #btn-kml {
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 16px;
      cursor: pointer;
      transition: opacity .2s;
      display: flex; align-items: center; gap: 6px;
    }
    #btn-kml:hover { opacity: .85; }

    /* ── 메인 레이아웃 ── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── 사이드 패널 ── */
    #sidebar {
      width: 320px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-title { font-size: 13px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: .8px; }

    /* 범례 */
    .legend {
      display: flex;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-sub); }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* 검색 */
    .search-wrap {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--text-sub); }

    /* 필터 탭 */
    .filter-tabs {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-sub);
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 0;
      cursor: pointer;
      transition: all .2s;
    }
    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* 목록 */
    #facility-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    #facility-list::-webkit-scrollbar { width: 4px; }
    #facility-list::-webkit-scrollbar-track { background: transparent; }
    #facility-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .facility-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all .2s;
    }
    .facility-card:hover { border-color: var(--accent); transform: translateX(2px); }
    .facility-card.active { border-color: var(--accent); background: #1e2244; }

    .card-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
    .card-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .card-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
    .card-badge {
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 10px;
      color: var(--text-sub);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-address { font-size: 11px; color: var(--text-sub); line-height: 1.4; }
    .card-meta { display: flex; gap: 8px; margin-top: 5px; }
    .card-tag {
      font-size: 10px;
      color: var(--text-sub);
      background: var(--surface);
      border-radius: 4px;
      padding: 2px 6px;
    }

    /* 목록 없음 */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-sub);
      font-size: 13px;
    }

    /* ── 지도 ── */
    #map {
      flex: 1;
      background: #1a1d27;
    }

    /* 로딩 오버레이 */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,17,23,.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 20px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-sub); }

    /* 팝업 커스텀 */
    .leaflet-popup-content-wrapper {
      background: var(--surface2) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      box-shadow: 0 8px 32px rgba(0,0,0,.5) !important;
    }
    .leaflet-popup-tip { background: var(--surface2) !important; }
    .popup-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .popup-row { font-size: 12px; color: var(--text-sub); margin-bottom: 3px; }
    .popup-row strong { color: var(--text); }
    .popup-cat {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .popup-gmaps {
      display: inline-block;
      margin-top: 8px;
      font-size: 11px;
      color: var(--accent2);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      transition: background .2s;
    }
    .popup-gmaps:hover { background: var(--surface); }
  </style>
</head>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ── 전역 상태 ──────────────────────────────────────────────────────────────
let allFeatures = [];
let markers     = {};        // id → Leaflet marker
let activeCard  = null;
let currentTab  = '전체';
let geojsonData = null;

const COLOR_MAP = {
  '병원': '#e74c3c',
  '의원': '#5b9cf6',
  '약국': '#3ec97e',
};

// ── 지도 초기화 ───────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([37.55, 127.0], 11);

// 다크 타일
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  maxZoom: 19,
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

// ── 마커 아이콘 ───────────────────────────────────────────────────────────
function makeIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 34" width="24" height="34">
    <path d="M12 0C5.373 0 0 5.373 0 12c0 9 12 22 12 22s12-13 12-22C24 5.373 18.627 0 12 0z"
      fill="${color}" stroke="#fff" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="5" fill="#fff"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [24, 34],
    iconAnchor: [12, 34],
    popupAnchor: [0, -36],
  });
}

// ── 팝업 HTML ─────────────────────────────────────────────────────────────
function popupHTML(p) {
  const color = COLOR_MAP[p.category] || '#95a5a6';
  const gmaps = `https://www.google.com/maps/search/${encodeURIComponent(p.name + ' ' + p.address)}`;
  return `
    <div class="popup-name">${p.name}</div>
    <span class="popup-cat" style="background:${color}22;color:${color}">${p.category}</span>
    <div class="popup-row">📍 <strong>${p.address}</strong></div>
    <div class="popup-row">📞 ${p.phone || '-'}</div>
    <div class="popup-row">📅 허가일: ${p.date}</div>
    <a class="popup-gmaps" href="${gmaps}" target="_blank">🗺 Google Maps에서 보기 →</a>
  `;
}

// ── 마커 생성 ─────────────────────────────────────────────────────────────
function createMarkers(features) {
  // 기존 마커 제거
  Object.values(markers).forEach(m => m.remove());
  markers = {};

  features.forEach((feat, idx) => {
    const p   = feat.properties;
    const c   = feat.geometry.coordinates;
    const clr = COLOR_MAP[p.category] || '#95a5a6';
    const m   = L.marker([c[1], c[0]], { icon: makeIcon(clr) })
                  .addTo(map)
                  .bindPopup(popupHTML(p), { maxWidth: 280 });

    m.on('click', () => focusCard(idx));
    markers[idx] = m;
  });
}

// ── 사이드바 목록 렌더링 ─────────────────────────────────────────────────
function renderList(features) {
  const list = document.getElementById('facility-list');
  if (!features.length) {
    list.innerHTML = `<div class="empty-state">🔍 검색 결과가 없습니다</div>`;
    return;
  }

  list.innerHTML = features.map((feat, idx) => {
    const p   = feat.properties;
    const clr = COLOR_MAP[p.category] || '#95a5a6';
    return `
      <div class="facility-card" id="card-${idx}" onclick="focusMarker(${idx})">
        <div class="card-header">
          <div class="card-dot" style="background:${clr}"></div>
          <div class="card-name">${p.name}</div>
          <div class="card-badge">${p.category}</div>
        </div>
        <div class="card-address">${p.address}</div>
        <div class="card-meta">
          <span class="card-tag">📅 ${p.date}</span>
          ${p.phone ? `<span class="card-tag">📞 ${p.phone}</span>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

// ── 필터 적용 ─────────────────────────────────────────────────────────────
function applyFilter() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();

  const filtered = allFeatures.filter(feat => {
    const p   = feat.properties;
    const cat = currentTab === '전체' || p.category === currentTab || p.type === currentTab;
    const txt = !q || p.name.includes(q) || p.address.toLowerCase().includes(q);
    return cat && txt;
  });

  createMarkers(filtered);
  renderList(filtered);

  // 인덱스를 filtered 기준으로 재매핑
  window._filtered = filtered;
}

// ── 탭 전환 ───────────────────────────────────────────────────────────────
function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

// ── 마커 → 지도 포커스 ────────────────────────────────────────────────────
function focusMarker(idx) {
  const m = markers[idx];
  if (!m) return;
  map.setView(m.getLatLng(), 16, { animate: true });
  m.openPopup();

  if (activeCard !== null) {
    document.getElementById(`card-${activeCard}`)?.classList.remove('active');
  }
  document.getElementById(`card-${idx}`)?.classList.add('active');
  activeCard = idx;
}

// ── 카드 → 사이드바 스크롤 ────────────────────────────────────────────────
function focusCard(idx) {
  if (activeCard !== null) {
    document.getElementById(`card-${activeCard}`)?.classList.remove('active');
  }
  const card = document.getElementById(`card-${idx}`);
  card?.classList.add('active');
  card?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  activeCard = idx;
}

// ── KML 다운로드 ─────────────────────────────────────────────────────────
function downloadKML() {
  if (typeof INLINE_KML !== 'undefined' && INLINE_KML) {
    const blob = new Blob([INLINE_KML], { type: 'application/vnd.google-earth.kml+xml' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'medical_map.kml';
    a.click();
    URL.revokeObjectURL(a.href);
  } else {
    alert('KML 파일을 생성하려면 다음 명령어를 실행하세요:\n\npython3 main.py --map --kml');
  }
}

// ── 인라인 GeoJSON 로드 (file:// CORS 우회) ──────────────────────────────
function loadGeoJSON() {
  document.getElementById('loading-overlay').style.display = 'none';

  if (typeof INLINE_GEOJSON === 'undefined' || !INLINE_GEOJSON) {
    document.getElementById('facility-list').innerHTML =
      `<div class="empty-state">데이터가 없습니다.<br>python3 main.py --map 을 실행해 주세요.</div>`;
    return;
  }

  try {
    geojsonData = INLINE_GEOJSON;
    allFeatures = geojsonData.features || [];

    document.getElementById('total-count').textContent = allFeatures.length;

    applyFilter();

    // 뷰 자동 조정
    if (allFeatures.length) {
      const latlngs = allFeatures.map(f => [f.geometry.coordinates[1], f.geometry.coordinates[0]]);
      map.fitBounds(L.latLngBounds(latlngs).pad(0.1));
    }
  } catch (e) {
    console.error('GeoJSON 파싱 실패:', e);
    document.getElementById('facility-list').innerHTML =
      `<div class="empty-state">데이터 파싱 실패.<br>${e.message}</div>`;
  }
}

window._filtered = [];
loadGeoJSON();
</script>
